apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: spring-petclinic=ghcr.io/srouabeh-ext/spring-petclinic
    argocd-image-updater.argoproj.io/spring-petclinic.update-strategy: semver
    argocd-image-updater.argoproj.io/spring-petclinic.allow-tags: regexp:^([0-9]+)\.([0-9]+)\.([0-9]+)$
    argocd-image-updater.argoproj.io/spring-petclinic.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: https://github.com/srouabeh-ext/helm.git
    targetRevision: HEAD
    path: '.'
    helm:
      parameters:
      - name: "image.tag"
        value: "5.0.0" # Version de départ
      - name: "app.contextPath"
        value: "/tp11"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
